<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Məhsul Detalı — Ilk Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream:    '#f4f1eb',
                        surface:  '#ffffff',
                        surface2: '#f0ece3',
                        border:   '#e0d9cc',
                        accent:   '#2d6a4f',
                        accent2:  '#52b788',
                        muted:    '#888888',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'serif'],
                        sans:    ['"DM Sans"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-cream text-gray-900 font-sans min-h-screen" style="padding-top: 68px;">

<!-- HEADER -->
<header style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background:rgba(244,241,235,0.92); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);" class="w-full border-b border-border">
    <div class="container mx-auto flex items-center justify-between px-4 sm:px-8 h-[68px]">
        <a href="index.html">
            <div class="font-display text-2xl font-black tracking-tight" style="background:linear-gradient(135deg,#2d6a4f,#52b788);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
                Ilk Shop
            </div>
            <div class="text-[11px] font-light tracking-widest uppercase text-muted -mt-1">Premium Collection</div>
        </a>
        <a href="index.html" class="flex items-center gap-2 text-sm font-medium text-accent border border-accent px-4 py-2 rounded-full hover:bg-accent hover:text-white transition-all duration-200">
            ← Geri
        </a>
    </div>
</header>

<!-- DETAIL CONTENT -->
<div id="detailwrap" class="min-h-[calc(100vh-68px)] flex items-center justify-center px-4 sm:px-8 py-12">
    <div id="detaillist" class="w-full max-w-4xl"></div>
</div>

<!-- SKELETON -->
<div id="skeleton" class="w-full max-w-4xl mx-auto px-4 sm:px-8 py-12 hidden">
    <div class="bg-surface border border-border rounded-2xl overflow-hidden md:flex animate-pulse">
        <div class="md:w-1/2 h-[360px] bg-[#e8e2d8]"></div>
        <div class="md:w-1/2 p-8 flex flex-col gap-4">
            <div class="h-3 bg-[#e8e2d8] rounded-full w-1/3"></div>
            <div class="h-7 bg-[#e8e2d8] rounded-full w-3/4"></div>
            <div class="h-4 bg-[#e8e2d8] rounded-full w-1/4"></div>
            <div class="space-y-2 mt-4">
                <div class="h-3 bg-[#e8e2d8] rounded-full"></div>
                <div class="h-3 bg-[#e8e2d8] rounded-full w-5/6"></div>
                <div class="h-3 bg-[#e8e2d8] rounded-full w-4/6"></div>
            </div>
            <div class="mt-auto flex items-center justify-between pt-6">
                <div class="h-10 bg-[#e8e2d8] rounded-full w-1/3"></div>
                <div class="h-10 bg-[#e8e2d8] rounded-xl w-1/3"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const Base_APi = 'https://69c575978a5b6e2dec2c85a6.mockapi.io/product/product'
    let detaillist = document.getElementById('detaillist')
    let skeleton   = document.getElementById('skeleton')
    let detailwrap = document.getElementById('detailwrap')

    function slugCreate(title) {
        return title
            .toLowerCase()
            .trim()
            .replace(/[^\w\s-]/g, '')
            .replace(/[\s_-]+/g, '-')
            .replace(/^-+|-+$/g, '')
    }

    function getDetail() {
        const urlParams = new URLSearchParams(window.location.search)
        const sendSlug  = urlParams.get('s')
        const sendId    = urlParams.get('id')

        skeleton.classList.remove('hidden')
        detailwrap.classList.add('hidden')

        fetch(Base_APi)
            .then(res => res.json())
            .then(mehsul => {
                let product
                if (sendSlug) {
                    product = mehsul.find(item => slugCreate(item.title) === sendSlug)
                } else if (sendId) {
                    product = mehsul.find(item => item.id == sendId)
                }

                skeleton.classList.add('hidden')
                detailwrap.classList.remove('hidden')

                if (!product) {
                    detaillist.innerHTML = `
                        <div class="text-center py-16 text-muted">
                            <p class="font-display text-2xl font-bold mb-2 text-gray-800">Məhsul tapılmadı</p>
                            <p class="text-sm mb-6">Axtardığınız məhsul mövcud deyil.</p>
                            <a href="index.html" class="bg-accent text-white px-6 py-2.5 rounded-xl text-sm font-medium hover:bg-accent2 transition-all">
                                Ana Səhifəyə Qayıt
                            </a>
                        </div>`
                    return
                }

                document.title = product.title + ' — Ilk Shop'

                detaillist.innerHTML = `
                    <div class="bg-surface border border-border rounded-2xl overflow-hidden md:flex shadow-xl">
                        <div class="md:w-1/2 bg-white flex items-center justify-center p-8 min-h-[300px]">
                            <img src="${product.image}" alt="${product.title}" class="w-full max-h-[360px] object-contain"/>
                        </div>
                        <div class="md:w-1/2 p-8 flex flex-col justify-between">
                            <div>
                                <nav class="text-xs text-muted mb-4 font-medium uppercase tracking-widest">
                                    <a href="index.html" class="hover:text-accent transition">Ana Səhifə</a>
                                    <span class="mx-2">/</span>
                                    <span class="text-accent">${product.category}</span>
                                </nav>
                                <h1 class="font-display text-3xl font-bold mb-3 text-gray-900">${product.title}</h1>
                                <span class="inline-block bg-accent/10 text-accent text-xs px-3 py-1 rounded-full mb-4 font-semibold uppercase tracking-wider border border-accent/20">
                                    ${product.category}
                                </span>
                                <p class="text-muted leading-relaxed mb-6 text-sm">
                                    ${product.description || 'Bu məhsul üçün ətraflı təsvir qeyd olunmayıb.'}
                                </p>
                            </div>
                            <div class="flex items-center justify-between mt-auto pt-4 border-t border-border">
                                <div>
                                    <div class="text-[11px] text-muted uppercase tracking-widest mb-1">Qiymət</div>
                                    <div class="font-display text-4xl font-bold text-accent">${product.price} <span class="text-2xl">AZN</span></div>
                                </div>
                                <button onclick="sebetAdd(${item.id}) class="bg-accent text-white px-6 py-3 rounded-xl font-semibold text-sm tracking-wide transition-all duration-200 hover:bg-accent2 hover:scale-[1.03] active:scale-95">
                                    Səbətə at
                                </button>
                            </div>
                        </div>
                    </div>`
            })
            .catch(() => {
                skeleton.classList.add('hidden')
                detailwrap.classList.remove('hidden')
                detaillist.innerHTML = `<div class="text-center py-16 text-muted text-sm">Məlumat yüklənərkən xəta baş verdi.</div>`
            })
    }

    getDetail()
</script>
</body>
</html>
